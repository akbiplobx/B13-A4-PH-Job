<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B13-A4-PH-Job-Tracker</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100">
    <header class="w-[80%] mx-auto">
        <h1 class="text-4xl font-bold my-6">Job Application Tracker</h1>
        <div class="grid grid-cols-3 gap-8">
            <div class="bg-white p-4 my-5 rounded ">
                <p>Total</p>
                <p id="total" class="text-2xl font-bold">0</p>
            </div>

            <div class="bg-white p-4 my-5 rounded ">
                <p>Interview</p>
                <p id="interviewCount" class="text-2xl font-bold">0</p>
            </div>

            <div class="bg-white p-4 my-5 rounded ">
                <p>Rejected</p>
                <p id="rejectCount" class="text-2xl font-bold">0</p>
            </div>
        </div>
    </header>
    <hr class="my-5 w-[80%] mx-auto border-gray-300">
    <main class="w-[80%] mx-auto">
        <!-- available job section start -->
        <div class="flex justify-between ">
            <h2 class="text-2xl font-bold mb-6">Availabe Jobs</h2>
            <div class="flex gap-4 text-xl">
                <p>Total</p>
                <p id="total">0</p>
            </div>
        </div>
         <!-- available job section end -->
        
        <!-- toggle btn start-->
<div class="mb-6">
            <button onclick="toggleStyle('all-filter-btn')"  class="bg-blue-500 rounded text-white px-5 py-2" id="all-filter-btn">All</button>
            <button onclick="toggleStyle('interview-filter-btn')"  class="bg-white rounded px-5 py-2" id="interview-filter-btn">Interview</button>
            <button onclick="toggleStyle('reject-filter-btn')"  class="bg-white rounded px-5 py-2" id="reject-filter-btn">Rejected</button>
        </div>
<!-- toggle btn end -->
  <!-- Filter card start-->
        <section id="filtered-section" class="hidden">

        </section>
        <!-- Filter card end-->
         <!-- all card section start-->
         <section id="allCards" class="space-y-6">
 <!-- card 1 -->
            <div class="card flex justify-between rounded p-8 bg-white">
                <!-- main part 1 -->
                <div class="space-y-6">
                    <!-- part 1 -->
                    <div>
                        <p class="cardTitle text-xl font-bold">Mobile First Corp</p>
                        <p class="cardSubTitle">React Native Developer</p>
                    </div>

                    <!-- part 2 -->
                    <div class="flex gap-2">
                        <p class="">Remote  •  Full-time  •  $130,000 - $175,000</p>
                    </div>
                    <!-- part 3 -->
                     <button class="status light bg-gray-200 px-4 py-2 rounded">Not Applied</button>
                     <p class="notes">Build cross-platform mobile applications using React Native. Work on products used by millions of users worldwide.</p>

                     <div class="flex gap-5">
                        <button class="interview-btn border-2 border-green-400 text-green-400 font-bold px-3 py-1 rounded cursor-pointer">Interview</button>
                        <button class="reject-btn border-2 border-red-400 text-red-400 font-bold px-3 py-1 rounded cursor-pointer">Rejected</button>
                     </div>
                </div>

                <!-- main part 2 -->
                <div>
                    <button class="btn-delete rounded-full h-10 border-gray-100 bg-white w-10 border p-1 justify-center cursor-pointer"><i class="fa-regular fa-trash-can"></i></button>
                </div>
            </div>



         </section>
         <!-- all card section end-->
    </main>
</body>
</html>
