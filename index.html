<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B13-A4-PH-Job-Tracker</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100">
    <header class="w-[80%] mx-auto">
        <h1 class="text-4xl font-bold my-6">Job Application Tracker</h1>
        <div class="grid grid-cols-3 gap-8">
            <div class="bg-white p-4 my-5 rounded ">
                <p>Total</p>
                <p id="total" class="text-2xl font-bold">0</p>
            </div>

            <div class="bg-white p-4 my-5 rounded ">
                <p>Interview</p>
                <p id="interviewCount" class="text-2xl font-bold">0</p>
            </div>

            <div class="bg-white p-4 my-5 rounded ">
                <p>Rejected</p>
                <p id="rejectCount" class="text-2xl font-bold">0</p>
            </div>
        </div>
    </header>
    <hr class="my-5 w-[80%] mx-auto border-gray-300">
    <main class="w-[80%] mx-auto">
        <!-- available job section start -->
        <div class="flex justify-between ">
            <h2 class="text-2xl font-bold mb-6">Availabe Jobs</h2>
            <div class="flex gap-4 text-xl">
                <p>Total</p>
                <p id="total">0</p>
            </div>
        </div>
         <!-- available job section end -->
        
        <!-- toggle btn start-->
<div class="mb-6">
            <button onclick="toggleStyle('all-filter-btn')"  class="bg-blue-500 rounded text-white px-5 py-2" id="all-filter-btn">All</button>
            <button onclick="toggleStyle('interview-filter-btn')"  class="bg-white rounded px-5 py-2" id="interview-filter-btn">Interview</button>
            <button onclick="toggleStyle('reject-filter-btn')"  class="bg-white rounded px-5 py-2" id="reject-filter-btn">Rejected</button>
        </div>
<!-- toggle btn end -->
    </main>
</body>
</html>
