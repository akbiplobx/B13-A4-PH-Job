<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B13-A4-PH-Job-Tracker</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100">
    <header class="w-[80%] mx-auto">
        <h1 class="text-4xl font-bold my-6">Job Application Tracker</h1>
        <div class="grid grid-cols-3 gap-8">
            <div class="bg-white p-4 my-5 rounded ">
                <p>Total</p>
                <p id="total" class="text-2xl font-bold">0</p>
            </div>

            <div class="bg-white p-4 my-5 rounded ">
                <p>Interview</p>
                <p id="interviewCount" class="text-2xl font-bold">0</p>
            </div>

            <div class="bg-white p-4 my-5 rounded ">
                <p>Rejected</p>
                <p id="rejectCount" class="text-2xl font-bold">0</p>
            </div>
        </div>
    </header>
</body>
</html>
